<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鼠标点击与滚轮检测原型</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --mouse-body: #ffffff;
            --mouse-stroke: #334155;
            /* 图1中的浅蓝色高亮 */
            --highlight-color: #3b82f6; 
            --highlight-fill: rgba(59, 130, 246, 0.2);
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .container {
            text-align: center;
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        h2 { color: #1e293b; margin-bottom: 1.5rem; }

        /* SVG 样式控制 */
        #mouse-svg {
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }

        .mouse-part {
            fill: var(--mouse-body);
            stroke: var(--mouse-stroke);
            stroke-width: 2;
            transition: all 0.1s ease;
        }

        /* 默认状态下的滚轮 */
        #wheel { fill: #e2e8f0; }

        /* 激活状态（被按下时） */
        .active {
            fill: var(--highlight-fill) !important;
            stroke: var(--highlight-color) !important;
            stroke-width: 3;
        }

        /* 滚轮滚动的特殊颜色 */
        .wheel-scrolling {
            fill: var(--highlight-color) !important;
        }

        .info-panel {
            margin-top: 20px;
            padding: 10px;
            border-radius: 8px;
            background: #f8fafc;
            color: #64748b;
            min-width: 200px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>鼠标硬件检测原型</h2>
    
    <svg id="mouse-svg" width="200" height="300" viewBox="0 0 200 300">
        <path class="mouse-part" d="M100,280 Q20,280 20,180 L20,100 Q20,20 100,20 Q180,20 180,100 L180,180 Q180,280 100,280 Z" />
        
        <path id="btn-left" class="mouse-part" d="M100,20 L50,20 Q20,20 20,80 L20,130 L100,130 Z" />
        
        <path id="btn-right" class="mouse-part" d="M100,20 L150,20 Q180,20 180,80 L180,130 L100,130 Z" />
        
        <rect id="wheel" class="mouse-part" x="88" y="50" width="24" height="45" rx="12" />
        
        <line x1="100" y1="130" x2="100" y2="20" stroke="#334155" stroke-width="2" />
    </svg>

    <div class="info-panel" id="status-text">等待输入...</div>
</div>

<script>
    const leftBtn = document.getElementById('btn-left');
    const rightBtn = document.getElementById('btn-right');
    const wheel = document.getElementById('wheel');
    const statusText = document.getElementById('status-text');

    // 状态映射表
    const buttons = {
        0: { el: leftBtn, text: "左键点击" },
        1: { el: wheel, text: "中键点击" },
        2: { el: rightBtn, text: "右键点击" }
    };

    // 1. 监听按下事件
    window.addEventListener('mousedown', (e) => {
        // 阻止默认行为（如右键菜单，除非你需要它）
        if (e.button === 2) e.preventDefault();
        
        const btn = buttons[e.button];
        if (btn) {
            btn.el.classList.add('active');
            statusText.innerText = `按下: ${btn.text}`;
        }
    });

    // 2. 监听松开事件
    window.addEventListener('mouseup', (e) => {
        const btn = buttons[e.button];
        if (btn) {
            btn.el.classList.remove('active');
            statusText.innerText = `松开: ${btn.text}`;
        }
    });

    // 3. 监听滚轮滚动
    let wheelTimer = null;
    window.addEventListener('wheel', (e) => {
        wheel.classList.add('wheel-scrolling');
        const direction = e.deltaY > 0 ? "向下滚动" : "向上滚动";
        statusText.innerText = `正在 ${direction}`;

        // 停止滚动 150ms 后自动取消高亮
        clearTimeout(wheelTimer);
        wheelTimer = setTimeout(() => {
            wheel.classList.remove('wheel-scrolling');
            statusText.innerText = "滚动停止";
        }, 150);
    }, { passive: true });

    // 4. 全局禁用右键菜单，方便测试右键点击
    window.oncontextmenu = (e) => {
        e.preventDefault();
        return false;
    };
</script>

</body>
</html>
